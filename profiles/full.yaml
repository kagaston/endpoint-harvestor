name: full
description: Full collection — all collectors with file hashing and YARA scanning
timeout: 600
hash_files: true
yara_scan: true
collectors:
  - system_info
  - processes
  - network
  - users
  - persistence
  - filesystem
  - logs
  - browser
  - shell_history
  - usb_devices
  - installed_software
  - kernel_modules
  - firewall
  - environment
  - clipboard
  - certificates
